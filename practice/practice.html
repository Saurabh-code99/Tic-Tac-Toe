<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="practice.css">
</head>
<body>
    <h1>CALCULATOR</h1>
    <div class="calculator">
        <div class="contain">
        <input type="text" placeholder="0" id="inputbox">
        <div class="container">
        <div class="first">
            <button class="orange">AC</button>
            <button class="orange">DEL</button>
            <button class="orange">%</button>
            <button class="orange">/</button>
        </div>
        <div class="second">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="orange">*</button>
        </div>
        <div class="third">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="orange">-</button>
        </div>
        <div class="fourth">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="orange">+</button>
        </div>
        <div class="last">
            <button>00</button>
            <button>0</button>
            <button>.</button>
            <button class="orange">=</button>
        </div>
        </div>
        </div>
    </div>
</body>
<script src="practice.js"></script>
</html>
